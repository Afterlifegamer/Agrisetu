<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>AgriSetu | Secure Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                "colors": {
                        "primary": "#173b1e",
                        "secondary": "#75584d",
                        "tertiary": "#641800",
                        "surface": "#fafaf5",
                        "surface-container-low": "#f4f4ef",
                        "surface-container-highest": "#e3e3de",
                        "on-surface": "#1a1c19",
                        "on-surface-variant": "#424841",
                        "outline-variant": "#c2c8be",
                        "primary-container": "#2e5233"
                },
                "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Work Sans", "sans-serif"]
                }
              },
            },
          }
    </script>
    <style>
        body { font-family: 'Work Sans', sans-serif; background-color: #f4f4ef; color: #1a1c19; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .premium-shadow { box-shadow: 0 16px 32px -8px rgba(26, 28, 25, 0.06); }
    </style>
</head>
<body class="bg-surface-container-low min-h-screen">
<!-- TopNavBar -->
<nav class="fixed top-0 w-full z-50 bg-stone-50/80 backdrop-blur-xl shadow-sm">
    <div class="flex justify-between items-center px-12 py-6 max-w-[1920px] mx-auto">
        <div class="flex items-center gap-6">
            <button onclick="window.history.back()" class="flex h-10 w-10 items-center justify-center rounded-full hover:bg-stone-100 transition-colors">
                <span class="material-symbols-outlined text-primary">arrow_back</span>
            </button>
            <div class="text-2xl font-black text-primary uppercase tracking-tighter font-headline">AgriSetu</div>
        </div>
        <div class="hidden md:flex items-center gap-8 font-headline font-bold tracking-tight">
            <a class="text-stone-500 hover:text-primary transition-colors" href="home.html">Home</a>
            <a class="text-stone-500 hover:text-primary transition-colors" href="predict.html">Predict</a>
            <a class="text-stone-500 hover:text-primary transition-colors" href="marketplace.html">Marketplace</a>
            <a class="text-primary border-b-2 border-primary pb-1" href="checkout.html">Checkout</a>
        </div>
    </div>
</nav>

<main class="pt-32 pb-24 px-12 max-w-[1400px] mx-auto">
    <header class="mb-16">
        <span class="text-secondary font-bold uppercase tracking-widest text-xs mb-4 block">Finalize Your Harvest Acquisition</span>
        <h1 class="text-6xl font-headline font-extrabold text-primary -tracking-tight">Secure <span class="text-secondary italic font-light">Checkout</span></h1>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
        <!-- Cart Items -->
        <div class="lg:col-span-7 space-y-8">
            <div class="bg-surface p-8 rounded-2xl premium-shadow border border-outline-variant/10">
                <h2 class="text-2xl font-headline font-bold text-primary mb-8 border-b border-outline-variant pb-4">Order Summary</h2>
                <div id="cart-items-container" class="space-y-6">
                    <!-- Dynamic Items -->
                    <div class="flex gap-6 pb-6 border-b border-outline-variant/30">
                        <div class="w-24 h-24 bg-surface-container-highest rounded-xl animate-pulse"></div>
                        <div class="flex-1">
                            <div class="h-6 w-1/3 bg-surface-container-highest rounded mb-2"></div>
                            <div class="h-4 w-1/4 bg-surface-container-highest rounded"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Payment & Totals -->
        <div class="lg:col-span-5">
            <div class="bg-primary text-white p-8 rounded-2xl premium-shadow sticky top-32">
                <h2 class="text-2xl font-headline font-bold mb-8 opacity-90">Payment Details</h2>
                
                <div class="space-y-4 mb-8">
                    <div class="flex justify-between text-white/70">
                        <span>Subtotal</span>
                        <span id="subtotal-value">Rs. 0</span>
                    </div>
                    <div class="flex justify-between text-white/70">
                        <span>Logistics & Handling</span>
                        <span id="shipping-value">Rs. 450</span>
                    </div>
                    <div class="h-[1px] bg-white/20 my-4"></div>
                    <div class="flex justify-between text-xl font-bold">
                        <span>Total Payable</span>
                        <span id="total-value">Rs. 0</span>
                    </div>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-bold uppercase tracking-widest mb-2 block opacity-60">Delivery Address</label>
                        <textarea class="w-full bg-white/10 border-white/20 rounded-xl p-4 text-sm focus:ring-1 focus:ring-white/40 border-none h-24 placeholder:text-white/30" placeholder="Enter full address..."></textarea>
                    </div>
                    <button class="w-full py-5 bg-white text-primary font-black rounded-xl hover:bg-stone-100 transition-all flex items-center justify-center gap-3 shadow-xl">
                        <span class="material-symbols-outlined">verified_user</span>
                        Complete Acquisition
                    </button>
                </div>

                <div class="mt-8 flex items-center gap-4 text-[10px] font-bold uppercase tracking-widest opacity-60 justify-center">
                    <div class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">lock</span> Secure SSL</div>
                    <div class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">verified</span> Direct To Farm</div>
                </div>
            </div>
        </div>
    </div>
</main>

<script type="module">
    import { cart, removeFromCart } from './data/cart.js';
    import { products } from './data/products.js';

    function renderCheckout() {
        const container = document.getElementById('cart-items-container');
        container.innerHTML = '';
        let subtotal = 0;

        if (cart.length === 0) {
            container.innerHTML = '<p class="text-on-surface-variant font-medium">Your cart is empty.</p>';
            document.getElementById('subtotal-value').textContent = 'Rs. 0';
            document.getElementById('shipping-value').textContent = 'Rs. 0';
            document.getElementById('total-value').textContent = 'Rs. 0';
            return;
        }

        cart.forEach(item => {
            const product = products.find(p => p.id === item.productId);
            if (!product) return;

            const itemTotal = product.price * item.quantity;
            subtotal += itemTotal;

            const div = document.createElement('div');
            div.className = 'flex gap-6 pb-6 border-b border-outline-variant/30 group';
            div.innerHTML = `
                <div class="w-24 h-24 rounded-xl overflow-hidden bg-surface-container-highest">
                    <img src="${product.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" 
                         onerror="this.src='https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?auto=format&fit=crop&q=80&w=800'">
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-start mb-1">
                        <h3 class="text-lg font-bold text-primary font-headline">${product.name}</h3>
                        <span class="font-bold text-primary">Rs. ${itemTotal.toLocaleString('en-IN')}</span>
                    </div>
                    <p class="text-xs text-on-surface-variant mb-4 font-medium uppercase tracking-wider">${product.category}</p>
                    <div class="flex items-center gap-4">
                        <span class="text-xs font-bold text-stone-400">Qty: ${item.quantity}</span>
                        <button class="text-[10px] font-black uppercase text-tertiary hover:underline js-remove-item" data-product-id="${product.id}">Remove</button>
                    </div>
                </div>
            `;
            container.appendChild(div);
        });

        document.getElementById('subtotal-value').textContent = `Rs. ${subtotal.toLocaleString('en-IN')}`;
        document.getElementById('shipping-value').textContent = `Rs. 450`;
        document.getElementById('total-value').textContent = `Rs. ${(subtotal + 450).toLocaleString('en-IN')}`;

        document.querySelectorAll('.js-remove-item').forEach(button => {
            button.addEventListener('click', (e) => {
                const productId = e.target.getAttribute('data-product-id');
                removeFromCart(productId);
                renderCheckout();
            });
        });
    }

    document.addEventListener('DOMContentLoaded', renderCheckout);
</script>
</body>
</html>
